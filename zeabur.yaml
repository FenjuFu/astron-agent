          - path: /docker-entrypoint-initdb.d/03-tenant.sql
            template: |-
              select 'tenant DATABASE initialization started' as '';
              CREATE DATABASE IF NOT EXISTS tenant;
              
              USE tenant;
              
              SET NAMES utf8mb4;
              SET FOREIGN_KEY_CHECKS = 0;
              
              -- ----------------------------
              -- Table structure for tb_app
              -- ----------------------------
              DROP TABLE IF EXISTS `tb_app`;
              
              CREATE TABLE `tb_app` (
                `update_time` timestamp NOT NULL DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP COMMENT '更新时间',
                `registration_time` datetime DEFAULT NULL COMMENT '创建时间',
                `app_id` varchar(32) COLLATE utf8_bin NOT NULL DEFAULT '' COMMENT '应用唯一标识',
                `app_name` varchar(256) COLLATE utf8_bin DEFAULT NULL COMMENT '应用名称',
                `dev_id` bigint(20) DEFAULT NULL COMMENT '开发者id',
                `channel_id` varchar(128) COLLATE utf8_bin DEFAULT NULL COMMENT '渠道id',
                `source` varchar(32) COLLATE utf8_bin DEFAULT '' COMMENT '来源',
                `is_disable` tinyint(1) DEFAULT NULL COMMENT '是否禁用(true禁用 false启用)',
                `app_desc` varchar(521) COLLATE utf8_bin DEFAULT NULL COMMENT '应用描述',
                `is_delete` tinyint(1) DEFAULT NULL COMMENT '是否删除',
                `extend` varchar(256) COLLATE utf8_bin DEFAULT '' COMMENT '扩展字段',
                PRIMARY KEY (`app_id`),
                KEY `idx_registration_time` (`registration_time`),
                KEY `idx_dev_id` (`dev_id`)
              ) ENGINE=InnoDB DEFAULT CHARSET=utf8 COLLATE=utf8_bin COMMENT='应用主表';
              
              INSERT INTO `tenant`.`tb_app` (`update_time`, `registration_time`, `app_id`, `app_name`, `dev_id`, `channel_id`, `source`, `is_disable`, `app_desc`, `is_delete`, `extend`)
                  VALUES ('2025-09-20 00:00:00', '2025-09-20 00:00:00', '680ab54f', '星辰租户', 1, '0', 'admin', 0, '星辰租户', 0, '');
              
              -- ----------------------------
              -- Table structure for tb_auth
              -- ----------------------------
              DROP TABLE IF EXISTS `tb_auth`;
              CREATE TABLE `tb_auth` (
                `update_time` timestamp NOT NULL DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP COMMENT '更新时间',
                `registration_time` datetime DEFAULT NULL COMMENT '创建时间',
                `app_id` varchar(32) COLLATE utf8_bin NOT NULL DEFAULT '' COMMENT '应用唯一标识',
                `api_key` varchar(128) COLLATE utf8_bin NOT NULL DEFAULT '' COMMENT '鉴权key',
                `api_secret` varchar(128) COLLATE utf8_bin DEFAULT NULL COMMENT '鉴权私钥',
                `source` bigint(20) DEFAULT NULL COMMENT '来源',
                `is_delete` tinyint(1) DEFAULT NULL COMMENT '是否删除',
                `extend` varchar(256) COLLATE utf8_bin DEFAULT NULL COMMENT '扩展字段',
                PRIMARY KEY (`app_id`,`api_key`),
                KEY `idx_registration_time` (`registration_time`),
                KEY `idx_api_key` (`api_key`)
              ) ENGINE=InnoDB DEFAULT CHARSET=utf8 COLLATE=utf8_bin COMMENT='应用关联的鉴权表';
              
              INSERT INTO `tenant`.`tb_auth` (`update_time`, `registration_time`, `app_id`, `api_key`, `api_secret`, `source`, `is_delete`, `extend`)
                  VALUES ('2025-09-20 00:00:00', '2025-09-20 00:00:00', '680ab54f', '7b709739e8da44536127a333c7603a83', 'NjhmY2NmM2NkZDE4MDFlNmM5ZjcyZjMy', 0, 0, '');
              
              select 'tenant DATABASE initialization completed' as '';

    - name: redis
      icon: https://raw.githubusercontent.com/zeabur/service-icons/main/marketplace/redis.svg
      template: PREBUILT_V2
      spec:
        source:
          image: redis:7
          command:
            - redis-server
            - /usr/local/etc/redis/redis.conf
        ports:
          - id: database
            port: 6379
            type: TCP
        volumes:
          - id: data
            dir: /data
        env:
          REDIS_PASSWORD:
            default: ${PASSWORD}
            expose: true
          REDIS_HOST:
            default: ${CONTAINER_HOSTNAME}
            expose: true
            readonly: true
          REDIS_PORT:
            default: ${DATABASE_PORT}
            expose: true
            readonly: true
        configs:
          - path: /usr/local/etc/redis/redis.conf
            template: |-
              requirepass ${REDIS_PASSWORD}
            envsubst: true

    - name: minio
      icon: https://raw.githubusercontent.com/zeabur/service-icons/main/marketplace/minio.svg
      template: PREBUILT_V2
      spec:
        source:
          image: minio/minio:RELEASE.2025-07-23T15-54-02Z
          command:
            - server
            - /data
            - --console-address
            - ":9001"
        ports:
          - id: api
            port: 9000
            type: HTTP
          - id: console
            port: 9001
            type: HTTP
        volumes:
          - id: data
            dir: /data
        env:
          MINIO_ROOT_USER:
            default: minioadmin
            expose: true
          MINIO_ROOT_PASSWORD:
            default: ${PASSWORD}
            expose: true
          MINIO_HOST:
            default: ${CONTAINER_HOSTNAME}
            expose: true
            readonly: true

    # ===========================================================================
    # Casdoor Authentication Services
    # ===========================================================================

    - name: casdoor-mysql
      icon: https://raw.githubusercontent.com/zeabur/service-icons/main/marketplace/mysql.svg
      template: PREBUILT_V2
      spec:
        source:
          image: mysql:8.4.6
        ports:
          - id: database
            port: 3306
            type: TCP
        volumes:
          - id: data
            dir: /var/lib/mysql
        env:
          MYSQL_ROOT_PASSWORD:
            default: ${PASSWORD}
          MYSQL_DATABASE:
            default: casdoor
          CASDOOR_MYSQL_HOST:
            default: ${CONTAINER_HOSTNAME}
            expose: true
            readonly: true
          CASDOOR_MYSQL_PORT:
            default: ${DATABASE_PORT}
            expose: true
            readonly: true
          CASDOOR_MYSQL_ROOT_PASSWORD:
            default: ${MYSQL_ROOT_PASSWORD}
            expose: true
            readonly: true

    - name: casdoor
      icon: https://raw.githubusercontent.com/zeabur/service-icons/main/marketplace/casdoor.svg
      template: PREBUILT_V2
      dependencies:
        - casdoor-mysql
      domainKey: CASDOOR_DOMAIN
      spec:
        source:
          image: casbin/casdoor:v2.67.0
          command:
            - /server
            - --createDatabase=true
        ports:
          - id: web
            port: 8000
            type: HTTP
        volumes:
          - id: logs
            dir: /logs
        env:
          CASDOOR_HOST:
            default: ${CONTAINER_HOSTNAME}
            expose: true
            readonly: true
          CASDOOR_PORT:
            default: "8000"
            expose: true
            readonly: true
          CASDOOR_PUBLIC_URL:
            default: ${ZEABUR_WEB_URL}
            expose: true
            readonly: true
          CONSOLE_DOMAIN:
            default: https://${PUBLIC_DOMAIN}
          CASDOOR_MYSQL_HOST:
            default: ${CASDOOR_MYSQL_HOST}
          CASDOOR_MYSQL_PORT:
            default: ${CASDOOR_MYSQL_PORT}
          CASDOOR_MYSQL_ROOT_PASSWORD:
            default: ${CASDOOR_MYSQL_ROOT_PASSWORD}
        configs:
          - path: /conf/app.conf
            template: |-
              appname = casdoor
              httpport = 8000
              runmode = dev
              copyrequestbody = true
              driverName = mysql
              dataSourceName = root:${CASDOOR_MYSQL_ROOT_PASSWORD}@tcp(${CASDOOR_MYSQL_HOST}:${CASDOOR_MYSQL_PORT})/
              dbName = casdoor
              tableNamePrefix =
              showSql = false
              redisEndpoint =
              defaultStorageProvider =
              isCloudIntranet = false
              authState = "casdoor"
              socks5Proxy = "127.0.0.1:10808"
              verificationCodeTimeout = 10
              initScore = 0
              logPostOnly = true
              isUsernameLowered = false
              origin =
              originFrontend =
              staticBaseUrl = "https://cdn.casbin.org"
              isDemoMode = false
              batchSize = 100
              enableErrorMask = false
              enableGzip = true
              inactiveTimeoutMinutes =
              ldapServerPort = 1389
              ldapsCertId = ""
              ldapsServerPort = 636
