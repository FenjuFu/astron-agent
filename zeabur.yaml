# yaml-language-server: $schema=https://schema.zeabur.app/template.json
apiVersion: zeabur.com/v1
kind: Template
metadata:
  name: AstronAgent
spec:
  description: >-
    Enterprise-grade open-source AI agent development platform that integrates AI workflow
    orchestration, model management, MCP tool integration, RPA automation, and team collaboration.
    Built by iFLYTEK.
  icon: https://raw.githubusercontent.com/iflytek/astron-agent/main/docs/logo.svg
  coverImage: https://raw.githubusercontent.com/iflytek/astron-agent/main/docs/imgs/Astron_Readme.png
  tags:
    - AI
    - Agent
    - Workflow
    - LLM
  variables:
    - key: PUBLIC_DOMAIN
      type: DOMAIN
      name: Application Domain
      description: The domain for accessing the Astron Agent web application.
    - key: CASDOOR_DOMAIN
      type: DOMAIN
      name: Casdoor Auth Domain
      description: The domain for the Casdoor authentication service (used for OAuth2 login).
    - key: PLATFORM_APP_ID
      type: STRING
      name: Platform App ID
      description: App ID for the AI platform (if applicable). 
    - key: PLATFORM_API_KEY
      type: STRING
      name: Platform API Key
      description: API Key for the AI platform (if applicable).
    - key: PLATFORM_API_SECRET
      type: STRING
      name: Platform API Secret
      description: API Secret for the AI platform.
    - key: SPARK_API_PASSWORD
      type: STRING
      name: Spark API Password
      description: Password for Spark API (if applicable).
    - key: SPARK_RTASR_API_KEY
      type: STRING
      name: Spark RTASR API Key
      description: API Key for Spark Real-time ASR (if applicable).
    - key: AI_ABILITY_CHAT_BASE_URL
      type: STRING
      name: AI Chat Base URL
      description: Base URL for AI Chat capabilities (OpenAI compatible).
    - key: AI_ABILITY_CHAT_MODEL
      type: STRING
      name: AI Chat Model
      description: Model ID for AI Chat capabilities.
    - key: AI_ABILITY_CHAT_API_KEY
      type: STRING
      name: AI Chat API Key
      description: API Key for AI Chat capabilities.
  readme: |-
    # Astron Agent

    Astron Agent is an **enterprise-grade, commercial-friendly** open-source AI agent development platform
    built by iFLYTEK. It integrates AI workflow orchestration, model management, AI and MCP tool integration,
    RPA automation, and team collaboration into one platform.

    ## Prerequisites

    Before deploying, you need:
    1. Configure your AI platform credentials. You can use iFLYTEK or other OpenAI-compatible providers.
       - For iFLYTEK: PLATFORM_APP_ID, PLATFORM_API_KEY, PLATFORM_API_SECRET
       - For generic OpenAI compatible services: AI_ABILITY_CHAT_BASE_URL, AI_ABILITY_CHAT_MODEL, AI_ABILITY_CHAT_API_KEY
    2. Two domains: one for the main application and one for Casdoor authentication.

    ## Deployment Steps

    1. Fill in your AI Platform credentials in the variables section.
    2. Bind two domains: one for the main application (nginx) and one for Casdoor authentication.
    3. After deployment, access Casdoor at your Casdoor domain.
       - Default credentials: username `admin`, password `123`
    4. Access the application at your main application domain.

    ## Default Login

    - **Casdoor Admin**: username `admin`, password `123` (change immediately after login)

    ## License

    Apache 2.0 — See [GitHub Repository](https://github.com/iflytek/astron-agent) for details.
  resourceRequirement:
    minConfig:
      cpu: 4
      ram: 8
    recommendedConfig:
      cpu: 8
      ram: 16
  services:
    # ===========================================================================
    # Infrastructure Services
    # ===========================================================================

    - name: postgresql
      icon: https://raw.githubusercontent.com/zeabur/service-icons/main/marketplace/postgresql.svg
      template: PREBUILT_V2
      spec:
        source:
          image: postgres:14
        ports:
          - id: database
            port: 5432
            type: TCP
        volumes:
          - id: data
            dir: /var/lib/postgresql/data
        env:
          POSTGRES_DB:
            default: sparkdb_manager
          POSTGRES_USER:
            default: spark
            expose: true
          POSTGRES_PASSWORD:
            default: ${PASSWORD}
            expose: true
          POSTGRES_HOST:
            default: ${CONTAINER_HOSTNAME}
            expose: true
            readonly: true
          POSTGRES_PORT:
            default: ${DATABASE_PORT}
            expose: true
            readonly: true

    - name: mysql
      icon: https://raw.githubusercontent.com/zeabur/service-icons/main/marketplace/mysql.svg
      template: PREBUILT_V2
      spec:
        source:
          image: mysql:8.4.6
        ports:
          - id: database
            port: 3306
            type: TCP
        volumes:
          - id: data
            dir: /var/lib/mysql
        env:
          MYSQL_ROOT_PASSWORD:
            default: ${PASSWORD}
            expose: true
          MYSQL_HOST:
            default: ${CONTAINER_HOSTNAME}
            expose: true
            readonly: true
          MYSQL_PORT:
            default: ${DATABASE_PORT}
            expose: true
            readonly: true
        configs:
          - path: /docker-entrypoint-initdb.d/01-console.sql
            template: |-
              SELECT 'astron_console DATABASE initialization started' AS '';
              CREATE DATABASE IF NOT EXISTS astron_console;
          - path: /docker-entrypoint-initdb.d/02-link.sql
            template: |-
              select 'spark-link DATABASE initialization started' as '';
              CREATE DATABASE IF NOT EXISTS `spark-link`;
              
              USE spark-link;
              
              SET NAMES utf8mb4;
              SET FOREIGN_KEY_CHECKS = 0;
              
              -- ----------------------------
              -- Table structure for link
              -- ----------------------------
              
              DROP TABLE IF EXISTS `tools_schema`;
              CREATE TABLE tools_schema (
                  `id` BIGINT PRIMARY KEY AUTO_INCREMENT COMMENT '主键ID',
                  `app_id` VARCHAR(32) COMMENT '应用ID',
                  `tool_id` VARCHAR(32) COMMENT '工具ID',
                  `name` VARCHAR(128) COMMENT '工具名称',
                  `description` VARCHAR(512) COMMENT '工具描述',
                  `open_api_schema` TEXT COMMENT 'open api schema，json格式',
                  `create_at` DATETIME(6) DEFAULT CURRENT_TIMESTAMP(6) COMMENT '创建时间',
                  `update_at` DATETIME(6) DEFAULT CURRENT_TIMESTAMP(6) ON UPDATE CURRENT_TIMESTAMP(6) COMMENT '更新时间',
                  `mcp_server_url` VARCHAR(255) COMMENT 'mcp_server_url',
                  `schema` TEXT COMMENT 'schema,json格式',
                  `version` VARCHAR(32) NOT NULL DEFAULT 'V1.0' COMMENT '版本号',
                  `is_deleted` BIGINT NOT NULL DEFAULT 0 COMMENT '是否已删除',
                  UNIQUE KEY unique_tool_version (tool_id, version, is_deleted)
              ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4 COMMENT='工具数据库表';
              
              select 'spark-link DATABASE initialization completed' as '';
              
