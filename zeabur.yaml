        description: AI 对话能力 Base URL（兼容 OpenAI 协议）。
      - key: AI_ABILITY_CHAT_MODEL
        type: STRING
        name: AI 对话模型
        description: AI 对话能力模型 ID。
      - key: AI_ABILITY_CHAT_API_KEY
        type: STRING
        name: AI 对话 API Key
        description: AI 对话能力 API Key。
    readme: |-
      # Astron Agent

      Astron Agent 是由科大讯飞构建的**企业级商用友好**开源 AI 智能体开发平台，
      集成了 AI 工作流编排、模型管理、AI 与 MCP 工具集成、RPA 自动化和团队协作功能。

      ## 部署前准备

      部署前，您需要：
      1. 配置您的 AI 平台凭证。您可以使用讯飞开放平台或其他兼容 OpenAI 协议的服务。
         - 讯飞：PLATFORM_APP_ID, PLATFORM_API_KEY, PLATFORM_API_SECRET
         - 通用 OpenAI 兼容服务：AI_ABILITY_CHAT_BASE_URL, AI_ABILITY_CHAT_MODEL, AI_ABILITY_CHAT_API_KEY
      2. 准备两个域名：一个用于主应用，一个用于 Casdoor 认证服务。

      ## 部署步骤

      1. 在变量部分填写您的 AI 平台凭证。
      2. 绑定两个域名：一个用于主应用（nginx），一个用于 Casdoor 认证。
      3. 部署完成后，访问您的 Casdoor 域名。
         - 默认账号：用户名 `admin`，密码 `123`
      4. 访问主应用域名即可使用 Astron Agent。

      ## 默认登录信息

      - **Casdoor 管理员**：用户名 `admin`，密码 `123`（登录后请立即修改）

      ## 许可证

      Apache 2.0 — 详情请参阅 [GitHub 仓库](https://github.com/iflytek/astron-agent)
