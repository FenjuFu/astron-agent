    # ===========================================================================
    # Astron Agent Core Services
    # ===========================================================================

    - name: core-tenant
      icon: https://raw.githubusercontent.com/iflytek/astron-agent/main/docs/logo.svg
      template: PREBUILT_V2
      dependencies:
        - postgresql
        - mysql
        - redis
        - minio
      spec:
        source:
          image: ghcr.io/iflytek/astron-agent/core-tenant:latest
        volumes:
          - id: logs
            dir: /opt/tenant/logs
        env:
          SERVICE_PORT:
            default: "5052"
          SERVICE_LOCATION:
            default: hf
          DATABASE_DB_TYPE:
            default: mysql
          DATABASE_USERNAME:
            default: root
          DATABASE_PASSWORD:
            default: ${MYSQL_ROOT_PASSWORD}
          DATABASE_URL:
            default: (${MYSQL_HOST}:${MYSQL_PORT})/tenant
          DATABASE_MAX_OPEN_CONNS:
            default: "5"
          DATABASE_MAX_IDLE_CONNS:
            default: "5"
          LOG_PATH:
            default: log.txt
          CORE_TENANT_HOST:
            default: ${CONTAINER_HOSTNAME}
            expose: true
            readonly: true
          CORE_TENANT_PORT:
            default: "5052"
            expose: true
            readonly: true

    - name: core-database
      icon: https://raw.githubusercontent.com/iflytek/astron-agent/main/docs/logo.svg
      template: PREBUILT_V2
      dependencies:
        - postgresql
        - mysql
        - redis
        - minio
      spec:
        source:
          image: ghcr.io/iflytek/astron-agent/core-database:latest
        volumes:
          - id: logs
            dir: /opt/core/memory/database/logs
        env:
          SERVICE_PORT:
            default: "7990"
          PGSQL_HOST:
            default: ${POSTGRES_HOST}
          PGSQL_PORT:
            default: ${POSTGRES_PORT}
          PGSQL_USER:
            default: ${POSTGRES_USER}
          PGSQL_PASSWORD:
            default: ${POSTGRES_PASSWORD}
          PGSQL_DATABASE:
            default: sparkdb_manager
          REDIS_ADDR:
            default: ${REDIS_HOST}:${REDIS_PORT}
          REDIS_PASSWORD:
            default: ${REDIS_PASSWORD}
          OTLP_ENABLE:
            default: "0"
          CORE_DATABASE_HOST:
            default: ${CONTAINER_HOSTNAME}
            expose: true
            readonly: true
          CORE_DATABASE_PORT:
            default: "7990"
            expose: true
            readonly: true

